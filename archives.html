<!-- ABOUTME: Archives page showing all posts grouped by year and month. -->
<!-- ABOUTME: Provides chronological browsing of the full post history. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archives - velvetdaemon</title>
    <meta name="description" content="Browse all blog posts by year and month." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="index.html">velvetdaemon</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a class="nav-link invert-on-hover" href="posts.html">Posts</a>
          <a class="nav-link invert-on-hover" href="index.html#site-footer">About</a>
        </nav>
      </div>
    </header>

    <main class="site-main" id="main-content">
      <section class="post-stream">
        <header class="archives-header">
          <h1 class="section-title">All Posts</h1>
          <p>Browse all blog posts by year and month</p>
        </header>

        <div id="archives-content">
          <!-- Archives rendered here by JS -->
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Site footer">
      <div class="site-footer__inner">
        <p>&copy; <span id="current-year"></span> velvetdaemon &mdash; built for reading</p>
        <div class="site-footer__links">
          <a class="nav-link invert-on-hover" href="index.html#hero">About</a>
          <a
            class="nav-link invert-on-hover"
            href="https://github.com/dotxdaemon"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>
      </div>
    </footer>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/archives.js"></script>
  </body>
</html>
