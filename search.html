<!-- ABOUTME: Search page with full-text search across all posts. -->
<!-- ABOUTME: Provides instant filtering as user types. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search - velvetdaemon</title>
    <meta name="description" content="Search all blog posts." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas class="matrix-rain" id="matrix-rain" aria-hidden="true"></canvas>
    <div class="layout">
      <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="index.html">velvetdaemon</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a class="nav-link invert-on-hover" href="index.html">Home</a>
          <a class="nav-link invert-on-hover" href="search.html" aria-current="page">Search</a>
          <a class="nav-link invert-on-hover" href="posts.html">Posts</a>
        </nav>
      </div>
    </header>

    <main class="site-main" id="main-content">
      <section class="post-stream module-card">
        <header class="search-header">
          <h1 class="section-title">Search</h1>
        </header>

        <div class="search-form">
          <div class="search-input-wrapper">
            <span class="search-icon" aria-hidden="true">&#128269;</span>
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Search posts..."
              autocomplete="off"
              autofocus
            />
          </div>
        </div>

        <div id="search-results" aria-live="polite">
          <p class="search-hint">Type to search through all posts...</p>
        </div>
      </section>
      </main>
    </div>

    <footer class="site-footer" aria-label="Site footer">
      <div class="site-footer__inner">
        <p>&copy; <span id="current-year"></span> velvetdaemon &mdash; built for reading</p>
        <div class="site-footer__links">
          <a class="nav-link invert-on-hover" href="index.html#hero">About</a>
          <a
            class="nav-link invert-on-hover"
            href="https://github.com/dotxdaemon"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>
      </div>
    </footer>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
