<!-- ABOUTME: Individual post page with minimal post metadata. -->
<!-- ABOUTME: Shows the post title and date alongside the site layout. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Post - velvetdaemon</title>
    <meta name="description" id="page-description" content="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="index.html">velvetdaemon</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a class="nav-link invert-on-hover" href="posts.html">Posts</a>
          <a class="nav-link invert-on-hover" href="index.html#site-footer">About</a>
        </nav>
      </div>
    </header>

    <main class="site-main" id="main-content">
      <article class="post-detail" id="post-detail">
        <header class="post-header">
          <h1 class="post-title" id="post-title">Loading...</h1>
          <time id="post-date" datetime=""></time>
        </header>
      </article>
    </main>

    <footer class="site-footer" aria-label="Site footer">
      <div class="site-footer__inner">
        <p>&copy; <span id="current-year"></span> velvetdaemon &mdash; built for reading</p>
        <div class="site-footer__links">
          <a class="nav-link invert-on-hover" href="index.html#hero">About</a>
          <a
            class="nav-link invert-on-hover"
            href="https://github.com/dotxdaemon"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>
      </div>
    </footer>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/post-detail.js"></script>
  </body>
</html>
