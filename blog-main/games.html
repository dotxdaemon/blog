<!-- ABOUTME: Dedicated page for displaying favorite game cover art in the shared grid style. -->
<!-- ABOUTME: Uses the shared shuffled artwork renderer with title-only overlays and site nav chrome. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games - velvetdaemon</title>
    <meta name="description" content="Favorite games and cover art." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="games-page">
    <canvas class="matrix-rain" id="matrix-rain" aria-hidden="true"></canvas>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-title" href="index.html">velvetdaemon</a>
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link invert-on-hover" href="index.html">home</a>
            <a class="nav-link invert-on-hover" href="posts.html">posts</a>
            <a class="nav-link invert-on-hover" href="movies.html">movies</a>
            <a class="nav-link invert-on-hover" href="music.html">music</a>
            <a class="nav-link invert-on-hover" href="games.html" aria-current="page">games</a>
          </nav>
        </div>
      </header>

      <main class="site-main" id="main-content">
        <div class="left-column">
          <section class="listening-to module-card" aria-label="Games I like">
            <h1 class="section-title">GAMES I LIKE</h1>
            <ul
              class="album-grid"
              id="album-list"
              data-source="GAMES_I_LIKE"
              data-overlay="title"
              data-fit="cover"
              aria-label="Favorite games"
            ></ul>
          </section>
        </div>
      </main>
    </div>

    <script src="assets/js/games-i-like.js"></script>
    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
