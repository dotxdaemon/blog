<!-- ABOUTME: Archives page showing all posts grouped by year and month. -->
<!-- ABOUTME: Provides chronological browsing of the full post history. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archives - velvetdaemon</title>
    <meta name="description" content="Browse all blog posts by year and month." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <div class="site-title-block">
            <a class="site-title site-title-link" href="index.html">velvetdaemon</a>
            <hr class="site-title-rule" aria-hidden="true" />
          </div>
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="archives.html" aria-current="page">Archives</a>
            <a class="nav-link" href="search.html">Search</a>
            <a class="nav-link" href="posts.html">Posts</a>
          </nav>
        </div>
      </header>

      <main class="site-main" id="main-content">
        <section class="post-stream module-card">
          <header class="archives-header">
            <h1 class="section-title">All Posts</h1>
            <p>Browse all blog posts by year and month</p>
          </header>

          <div id="archives-content">
            <!-- Archives rendered here by JS -->
          </div>
        </section>
      </main>

      <footer class="site-footer" id="site-footer" aria-label="Site footer">
        <div class="site-footer__inner">
          <p>&copy; <span id="current-year"></span> velvetdaemon - built for reading</p>
          <div class="site-footer__links">
            <a class="nav-link" href="index.html">About</a>
            <a
              class="nav-link"
              href="https://github.com/dotxdaemon"
              target="_blank"
              rel="noreferrer"
            >

            </a>
          </div>
        </div>
      </footer>
    </div>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/archives.js"></script>
  </body>
</html>
