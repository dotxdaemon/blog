<!-- ABOUTME: Posts page listing the latest blog entries. -->
<!-- ABOUTME: Presents the post feed separate from the homepage layout. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts - velvetdaemon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas class="matrix-rain" id="matrix-rain" aria-hidden="true"></canvas>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-title" href="index.html">velvetdaemon</a>
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link invert-on-hover" href="index.html">home</a>
            <a class="nav-link invert-on-hover" href="search.html">search</a>
            <a class="nav-link invert-on-hover" href="posts.html" aria-current="page">posts</a>
            <a class="nav-link invert-on-hover" href="movies.html">movies</a>
            <a class="nav-link invert-on-hover" href="music.html">music</a>
          </nav>
        </div>
      </header>

      <main class="site-main" id="main-content">
        <section class="post-stream" id="latest-writing" aria-label="Latest writing">
          <h2 class="section-title">Latest writing</h2>
          <div class="post-list" id="posts" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
