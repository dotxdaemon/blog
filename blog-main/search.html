<!-- ABOUTME: Search page with full-text search across all posts. -->
<!-- ABOUTME: Provides instant filtering as user types. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search - velvetdaemon</title>
    <meta name="description" content="Search all blog posts." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <div class="site-title-block">
            <a class="site-title site-title-link" href="index.html">velvetdaemon</a>
            <hr class="site-title-rule" aria-hidden="true" />
          </div>
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="archives.html">Archives</a>
            <a class="nav-link" href="search.html" aria-current="page">Search</a>
            <a class="nav-link" href="posts.html">Posts</a>
          </nav>
        </div>
      </header>

      <main class="site-main" id="main-content">
        <section class="post-stream module-card">
          <header class="search-header">
            <h1 class="section-title">Search</h1>
          </header>

          <div class="search-form">
            <div class="search-input-wrapper">
              <span class="search-icon" aria-hidden="true">&#128269;</span>
              <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search posts..."
                autocomplete="off"
                autofocus
              />
            </div>
          </div>

          <div id="search-results" aria-live="polite">
            <p class="search-hint">Type to search through all posts...</p>
          </div>
        </section>
      </main>

      <footer class="site-footer" id="site-footer" aria-label="Site footer">
        <div class="site-footer__inner">
          <p>&copy; <span id="current-year"></span> velvetdaemon - built for reading</p>
          <div class="site-footer__links">
            <a class="nav-link" href="index.html">About</a>
            <a
              class="nav-link"
              href="https://github.com/dotxdaemon"
              target="_blank"
              rel="noreferrer"
            >
              GitHub
            </a>
          </div>
        </div>
      </footer>
    </div>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/search.js"></script>
  </body>
</html>
