<!-- ABOUTME: Individual post page template that shares the site header and reading surface styles. -->
<!-- ABOUTME: Renders dynamic post title, metadata badges, and long-form post content. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Post - velvetdaemon</title>
    <meta name="description" id="page-description" content="" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="post-page">
    <canvas class="matrix-rain" id="matrix-rain" aria-hidden="true"></canvas>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-title" href="index.html">velvetdaemon</a>
          <nav class="site-nav" aria-label="Primary navigation">
            <a class="nav-link invert-on-hover" href="index.html">home</a>
            <a class="nav-link invert-on-hover" href="search.html">search</a>
            <a class="nav-link invert-on-hover" href="posts.html">posts</a>
            <a class="nav-link invert-on-hover" href="movies.html">movies</a>
            <a class="nav-link invert-on-hover" href="music.html">music</a>
          </nav>
        </div>
      </header>

      <main class="site-main" id="main-content">
        <section class="post-stream post-detail-stream" aria-label="Post detail">
          <article class="post-detail" id="post-detail">
            <header class="post-header">
              <h1 class="post-title" id="post-title">Loading...</h1>
              <div class="post-meta-row" aria-label="Post metadata">
                <span class="post-meta-badge" id="post-date-badge"><time id="post-date" datetime=""></time></span>
              </div>
            </header>
            <div class="post-content" id="post-content"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/app.js" type="module"></script>
    <script src="assets/js/post-detail.js"></script>
  </body>
</html>
