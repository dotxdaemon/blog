# ABOUTME: Deploys the blog-main static site folder to GitHub Pages from the repository root.
# ABOUTME: Publishes only blog-main contents so Pages and Vercel serve the same site output.
name: Deploy blog-main to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-blog-main"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: touch blog-main/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blog-main
      - id: deployment
        uses: actions/deploy-pages@v4
