<!-- ABOUTME: Posts page listing the latest blog entries. -->
<!-- ABOUTME: Presents the post feed separate from the homepage layout. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts - velvetdaemon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body data-theme="dark">
    <canvas id="matrix-rain" class="matrix-canvas" aria-hidden="true"></canvas>
    <div class="matrix-veil" aria-hidden="true"></div>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="container nav-shell">
        <a class="site-brand" href="index.html#main-content">velvetdaemon</a>
        <nav id="primary-nav" class="nav-menu" aria-label="Primary navigation">
          <a class="nav-link" href="posts.html">Posts</a>
          <a class="nav-link" href="index.html#site-footer">About</a>
        </nav>
      </div>
      <div class="divider container" aria-hidden="true"></div>
    </header>

    <main class="page" id="main-content" data-layout="posts">
      <section
        class="section-block post-feed container"
        id="latest-writing"
        aria-label="Latest writing"
      >
        <div class="panel">
          <header class="panel-header">
            <h2 class="panel-title">Latest writing</h2>
          </header>
          <div class="panel-body">
            <ul class="post-list" id="posts" aria-live="polite"></ul>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer" aria-label="Site footer">
      <div class="divider container" aria-hidden="true"></div>
      <div class="container site-footer__inner">
        <p>© <span id="current-year"></span> velvetdaemon</p>
        <div class="site-footer__links">
          <a class="nav-link" href="index.html#site-footer">About</a>
          <a
            class="nav-link"
            href="https://github.com/dotxdaemon"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>
      </div>
    </footer>

    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/posts.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
