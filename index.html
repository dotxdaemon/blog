<!-- ABOUTME: Builds the reference-inspired homepage shell for the blog. -->
<!-- ABOUTME: Anchors the hero, navigation, and ambient controls. -->
<!-- ABOUTME: Primary homepage layout for the blog and listening widgets. -->
<!-- ABOUTME: Defines navigation, listening sections, and post listings for the site. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>velvetdaemon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body data-theme="dark">
    <canvas id="matrix-rain" class="matrix-canvas" aria-hidden="true"></canvas>
    <div class="matrix-veil" aria-hidden="true"></div>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="container nav-shell">
        <a class="site-brand" href="#main-content">velvetdaemon</a>
        <nav id="primary-nav" class="nav-menu" aria-label="Primary navigation">
          <a class="nav-link" href="#latest-writing">Posts</a>
          <a class="nav-link" href="#site-footer">About</a>
        </nav>
        <span class="build-stamp" id="build-stamp" data-build-sha="dee9f01">build: dee9f01 2026-02-02T20:18:30Z</span>
      </div>
      <div class="divider container" aria-hidden="true"></div>
    </header>

    <main class="page landing-grid" id="main-content" data-layout="index">
      <section
        class="section-block post-feed"
        id="latest-writing"
        aria-label="Latest writing"
      >
        <div class="panel">
          <header class="panel-header">
            <h2 class="panel-title">Latest writing</h2>
          </header>
          <div class="panel-body">
            <ul class="post-list" id="posts" aria-live="polite"></ul>
          </div>
        </div>
      </section>

      <section class="section-block" id="last-played" data-last-played>
        <div class="panel">
          <header class="panel-header">
            <h2 class="panel-title">Last played</h2>
          </header>
          <div class="panel-body">
            <div class="now-playing">
              <div class="now-playing__primary" id="now-playing-primary">
                <div class="loading">Loading tracks...</div>
              </div>
              <div class="now-playing__rows">
                <ul class="track-grid" id="track-grid" aria-label="Recent tracks"></ul>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="site-footer" aria-label="Site footer">
      <div class="divider container" aria-hidden="true"></div>
      <div class="container site-footer__inner">
        <p>© <span id="current-year"></span> velvetdaemon</p>
        <div class="site-footer__links">
          <a class="nav-link" href="#site-footer">About</a>
          <a
            class="nav-link"
            href="https://github.com/dotxdaemon"
            target="_blank"
            rel="noreferrer"
          >
            GitHub
          </a>
        </div>
      </div>
    </footer>

    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/posts.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
