<!-- ABOUTME: Provides the monochrome brutalist homepage for the static blog. -->
<!-- ABOUTME: Defines the header, navigation, recent posts stream, and footer. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Title</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-title">Site Title</h1>
        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link invert-on-hover" href="#">Home</a>
          <a class="nav-link invert-on-hover" href="#">About</a>
          <a class="nav-link invert-on-hover" href="#">Archive</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <section class="last-played" data-last-played aria-label="Last played">
        <div class="last-played__status" data-last-played-status></div>
        <ul class="track-list" id="track-grid" aria-label="Recent tracks"></ul>
      </section>

      <section class="post-stream" aria-labelledby="recent-posts">
        <h2 class="section-title" id="recent-posts">Recent Posts</h2>
        <div class="post-list" id="posts"></div>
      </section>
    </main>

    <footer class="site-footer">
    </footer>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
