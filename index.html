<!-- ABOUTME: Provides the monochrome brutalist homepage for the static blog. -->
<!-- ABOUTME: Defines the header, navigation, recent posts stream, and footer. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Title</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-title">Site Title</h1>
        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link invert-on-hover" href="#">Home</a>
          <a class="nav-link invert-on-hover" href="#">About</a>
          <a class="nav-link invert-on-hover" href="#">Archive</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <section class="post-stream" aria-labelledby="recent-posts">
        <h2 class="section-title" id="recent-posts">Recent Posts</h2>
        <div class="post-list">
          <article class="post-row invert-on-hover">
            <time class="post-date" datetime="2026-02-01">2026-02-01</time>
            <h2 class="post-title"><a class="post-link" href="#">Post One</a></h2>
          </article>
          <article class="post-row invert-on-hover">
            <time class="post-date" datetime="2026-01-24">2026-01-24</time>
            <h2 class="post-title"><a class="post-link" href="#">Post Two</a></h2>
          </article>
          <article class="post-row invert-on-hover">
            <time class="post-date" datetime="2026-01-17">2026-01-17</time>
            <h2 class="post-title"><a class="post-link" href="#">Post Three</a></h2>
          </article>
          <article class="post-row invert-on-hover">
            <time class="post-date" datetime="2026-01-10">2026-01-10</time>
            <h2 class="post-title"><a class="post-link" href="#">Post Four</a></h2>
          </article>
          <article class="post-row invert-on-hover">
            <time class="post-date" datetime="2026-01-03">2026-01-03</time>
            <h2 class="post-title"><a class="post-link" href="#">Post Five</a></h2>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Static blog footer.</p>
    </footer>
  </body>
</html>
