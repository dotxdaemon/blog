<!-- ABOUTME: Provides the monochrome brutalist homepage for the static blog. -->
<!-- ABOUTME: Defines the header, listening section, recent posts stream, and footer. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>velvetdaemon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas class="matrix-rain" id="matrix-rain" aria-hidden="true"></canvas>
    <div class="layout">
      <header class="site-header">
        <div class="site-header__inner">
          <div class="site-title-block">
            <h1 class="site-title">velvetdaemon</h1>
            <hr class="site-title-rule" aria-hidden="true" />
          </div>
        </div>
      </header>

      <main class="site-main" data-dashboard>
        <div class="left-column">
          <section class="listening-to module-card" data-listening-to aria-label="Listening to">
            <h2 class="section-title" id="listening-to">LISTENING TO</h2>
            <p class="dashboard-status" id="dashboard-status"><span class="live-dot" aria-hidden="true"></span><span class="dashboard-status-text">Dashboard is live</span></p>
            <div class="dashboard-track-empty" id="dashboard-track" aria-live="polite">
              <a class="dashboard-track-link" id="dashboard-track-link" href="#" hidden>
                <img class="dashboard-track-artwork" id="dashboard-track-artwork" src="" alt="" loading="lazy" />
              </a>
              <span class="dashboard-track-icon" aria-hidden="true">
                <svg viewBox="0 0 120 120" role="img" aria-label="Waveform placeholder">
                  <circle cx="60" cy="60" r="38" fill="none" stroke="currentColor" stroke-width="2"></circle>
                  <path d="M26 60h14l6-10 8 20 8-24 8 28 6-14h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </span>
              <p class="dashboard-track-text">No track selected yet</p>
            </div>
            <ul class="album-list" id="album-list" aria-label="Favorite albums"></ul>
            <div class="dashboard-fields" aria-hidden="true">
              <label class="dashboard-field">
                <span class="dashboard-field-label">ALBUM TITLE</span>
                <span class="dashboard-field-value" id="dashboard-album">—</span>
              </label>
              <label class="dashboard-field">
                <span class="dashboard-field-label">ARTIST NAME</span>
                <span class="dashboard-field-value" id="dashboard-artist">—</span>
              </label>
            </div>
            <div class="dashboard-scrub" aria-hidden="true"><div class="dashboard-scrub-progress"></div></div>
          </section>
        </div>

        <section class="post-stream module-card" aria-labelledby="recent-posts">
          <h2 class="section-title" id="recent-posts">RECENT POSTS</h2>
          <div class="post-list" id="posts"></div>
        </section>
      </main>
      <footer class="site-footer"></footer>
    </div>

    <script>
      window.VELVETDAEMON_DASHBOARD = window.VELVETDAEMON_DASHBOARD || {};
    </script>
    <script src="assets/js/posts.js"></script>
    <script src="assets/js/matrix.js"></script>
    <script src="assets/js/listening-to.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
